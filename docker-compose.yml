version: '3.8'

services:
  app:
    build: .
    container_name: video-process-app
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=videos
    depends_on:
      - minio
    networks:
      - video-network

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: video-process-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - video-network

networks:
  video-network:
    driver: bridge

volumes:
  minio_data:
